<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hosho Panel</title>
  </head>
  <body style="
    margin: 0;
    min-width: 420px;
    min-height: 100vh;
    background: #0b0f14;
    color: #e5e7eb;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  ">
    <main style="
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    ">
      <header style="
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      ">
        <div>
          <h1 style="
            margin: 0 0 4px;
            font-size: 18px;
            font-weight: 700;
            color: #f9fafb;
          ">Hosho</h1>
          <p style="
            margin: 0;
            color: #9ca3af;
            font-size: 12px;
          ">Network capture panel</p>
        </div>
        <span style="
          border: 1px solid #334155;
          border-radius: 999px;
          padding: 4px 9px;
          color: #94a3b8;
          font-size: 11px;
        ">HAR</span>
      </header>

      <section style="
        border: 1px solid #243041;
        background: #111827;
        border-radius: 8px;
        padding: 16px;
        box-sizing: border-box;
      ">
        <div style="
          border: 1px solid #334155;
          border-radius: 6px;
          background: #172033;
          color: #cbd5e1;
          padding: 10px 12px;
          margin-bottom: 14px;
          font-size: 12px;
        ">Streaming network traces, console warnings, console errors, and metrics.</div>

        <pre id="output" style="
          margin: 0;
          min-height: 260px;
          max-height: calc(100vh - 170px);
          overflow: auto;
          border: 1px solid #243041;
          border-radius: 6px;
          background: #05070a;
          color: #cbd5e1;
          padding: 12px;
          box-sizing: border-box;
          font-size: 12px;
          line-height: 1.5;
          white-space: pre-wrap;
          overflow-wrap: anywhere;
        ">Waiting for activity...</pre>
      </section>
    </main>

    <script type="module" src="panel/index.js"></script>
  </body>
</html>
