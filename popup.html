<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hosho</title>
</head>

<body style="
    margin: 0;
    padding: 0;
    width: 360px;
    min-height: 240px;
    background: #09090b;
    color: #e4e4e7;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  ">
  <div style="
      width: 100%;
      padding: 24px;
      box-sizing: border-box;
    ">
    <div style="
        border: 1px solid #27272a;
        background: #111111;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.03),
                    0 10px 30px rgba(0,0,0,0.6);
      ">
      <!-- Terminal Header -->
      <div style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 20px;
        ">
        <div style="display: flex; gap: 8px;">
          <div style="
              width: 10px;
              height: 10px;
              border-radius: 9999px;
              background: #ef4444;
            "></div>

          <div style="
              width: 10px;
              height: 10px;
              border-radius: 9999px;
              background: #f59e0b;
            "></div>

          <div style="
              width: 10px;
              height: 10px;
              border-radius: 9999px;
              background: #22c55e;
            "></div>
        </div>

        <div style="
            font-size: 12px;
            color: #71717a;
            letter-spacing: 0.08em;
          ">
          rust-greeter
        </div>
      </div>

      <!-- Terminal Content -->
      <div style="margin-bottom: 16px;">
        <div style="
            color: #22c55e;
            font-size: 13px;
            margin-bottom: 8px;
          ">
          $ enter_name
        </div>

        <input type="text" id="name" placeholder="ashu" style="
            width: 100%;
            box-sizing: border-box;
            background: #18181b;
            border: 1px solid #27272a;
            color: #fafafa;
            padding: 12px 14px;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;
          " />
      </div>

      <button id="greet" style="
          width: 100%;
          border: none;
          cursor: pointer;
          background: linear-gradient(135deg, #22c55e, #16a34a);
          color: #09090b;
          padding: 12px 14px;
          border-radius: 10px;
          font-weight: 700;
          font-size: 14px;
          letter-spacing: 0.03em;
          transition: all 0.2s ease;
          box-shadow: 0 4px 14px rgba(34,197,94,0.25);
        ">
        run greet()
      </button>

      <div id="output" style="
          margin-top: 18px;
          min-height: 48px;
          background: #0a0a0a;
          border: 1px solid #27272a;
          border-radius: 10px;
          padding: 12px;
          color: #a1a1aa;
          font-size: 13px;
          white-space: pre-wrap;
          overflow-wrap: break-word;
        ">
        waiting for input...
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
